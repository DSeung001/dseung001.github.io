{{ if .Store.Get "hasMermaid" }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: true });
</script>
{{ end }}

{{- with resources.Get "img/cursor.png" -}}
<div id="cursor-follower" aria-hidden="true">
  <img src="{{ .RelPermalink }}" alt="" width="25" decoding="async" fetchpriority="low">
</div>
<canvas id="cursor-ink-trail" aria-hidden="true"></canvas>
<script>
(function () {
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  var el = document.getElementById("cursor-follower");
  if (!el) return;
  var img = el.querySelector("img");
  if (!img) return;

  var gap = 10;
  var xOffset = 16;
  var LEAVE_MS = 7000;
  var edgePad = 72;
  var INK_GAP_PX = 5;
  var INK_COLOR = { r: 173, g: 143, b: 203 };

  var inkCanvas = document.getElementById("cursor-ink-trail");
  var inkCtx = inkCanvas && inkCanvas.getContext("2d");
  var inkDrops = [];
  var inkRaf = 0;
  var lastInkAnchorX = null;
  var lastInkAnchorY = null;

  var pointerInside = true;
  var leaveTimer = null;
  var flying = false;
  var rafId = 0;
  var lastPhysicsT = 0;

  /* 비행 물리: 뷰포트 좌표(px) 기준, 마우스 추적과 동일한 앵커 */
  var posX = 0;
  var posY = 0;
  var velX = 0;
  var velY = 0;
  var smoothHeading = null;
  var wanderPhase = Math.random() * Math.PI * 2;
  var burstLeft = 0;
  var nextRoamAt = 0;
  var roamTx = 0;
  var roamTy = 0;
  var returnTx = 0;
  var returnTy = 0;
  var nextReturnRetarget = 0;

  function toTranslate(px, py) {
    var w = el.offsetWidth || 25;
    return {
      x: px - w / 2 + xOffset,
      y: py + gap,
    };
  }

  function resizeInkCanvas() {
    if (!inkCanvas || !inkCtx) return;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCanvas.width = Math.max(1, Math.floor(vw * dpr));
    inkCanvas.height = Math.max(1, Math.floor(vh * dpr));
    inkCanvas.style.width = vw + "px";
    inkCanvas.style.height = vh + "px";
    inkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    inkCtx.clearRect(0, 0, vw, vh);
  }

  function inkEmitPoint(px, py) {
    var t = toTranslate(px, py);
    var wEl = el.offsetWidth || 25;
    var hEl = (img.offsetHeight || 26) > 4 ? img.offsetHeight : 26;
    return { x: t.x + wEl * 0.5, y: t.y + hEl * 0.78 };
  }

  /* 메타풍 불규칙 번짐 입자 여러 개 */
  function spawnInk(px, py, heavy) {
    if (!inkCtx) return;
    var p = inkEmitPoint(px, py);
    var n = heavy ? 6 + Math.floor(Math.random() * 5) : 4 + Math.floor(Math.random() * 4);
    var jitter = heavy ? 16 : 11;
    for (var i = 0; i < n; i++) {
      inkDrops.push({
        x: p.x + (Math.random() - 0.5) * jitter,
        y: p.y + (Math.random() - 0.5) * jitter,
        rx: 1.8 + Math.random() * 5.5,
        ry: 2.2 + Math.random() * 6.2,
        rot: Math.random() * Math.PI,
        a: 0.22 + Math.random() * 0.38,
        driftX: (Math.random() - 0.5) * 0.35,
        driftY: (Math.random() - 0.5) * 0.35,
        grow: 0.12 + Math.random() * 0.22,
        life: 1,
      });
    }
    inkLoopKick();
  }

  /* forceSplash: 거리 무시하고 한 번 뿌림, heavyCluster: 입자 수·번짐 더 큼 (비행 중에만) */
  function tryInkTrail(px, py, forceSplash, heavyCluster) {
    if (!inkCtx || !flying) return;
    var ep = inkEmitPoint(px, py);
    if (forceSplash) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, !!heavyCluster);
      return;
    }
    if (lastInkAnchorX === null) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, false);
      return;
    }
    var dx = ep.x - lastInkAnchorX;
    var dy = ep.y - lastInkAnchorY;
    if (dx * dx + dy * dy >= INK_GAP_PX * INK_GAP_PX) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, false);
    }
  }

  function inkFrame() {
    if (!inkCtx || inkDrops.length === 0) {
      inkRaf = 0;
      return;
    }
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCtx.clearRect(0, 0, vw, vh);
    inkCtx.globalCompositeOperation = "source-over";

    var i;
    var d;
    var r = INK_COLOR.r;
    var g = INK_COLOR.g;
    var b = INK_COLOR.b;
    for (i = inkDrops.length - 1; i >= 0; i--) {
      d = inkDrops[i];
      d.life -= 0.0085;
      d.rx += d.grow * 0.45;
      d.ry += d.grow * 0.38;
      d.x += d.driftX;
      d.y += d.driftY;
      d.rot += (Math.random() - 0.5) * 0.02;
      if (d.life <= 0) {
        inkDrops.splice(i, 1);
        continue;
      }
      var alpha = Math.max(0, d.a * d.life);
      inkCtx.fillStyle = "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      inkCtx.save();
      inkCtx.translate(d.x, d.y);
      inkCtx.rotate(d.rot);
      inkCtx.beginPath();
      inkCtx.ellipse(0, 0, d.rx, d.ry, 0, 0, Math.PI * 2);
      inkCtx.fill();
      inkCtx.restore();
    }

    if (inkDrops.length > 0) {
      inkRaf = requestAnimationFrame(inkFrame);
    } else {
      inkRaf = 0;
    }
  }

  function inkLoopKick() {
    if (!inkRaf && inkDrops.length > 0) {
      inkRaf = requestAnimationFrame(inkFrame);
    }
  }

  function resetInkAnchors() {
    lastInkAnchorX = null;
    lastInkAnchorY = null;
  }

  function clearInkVisual() {
    if (!inkCtx) return;
    inkDrops.length = 0;
    if (inkRaf) {
      cancelAnimationFrame(inkRaf);
      inkRaf = 0;
    }
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCtx.clearRect(0, 0, vw, vh);
  }

  if (inkCanvas && inkCtx) {
    resizeInkCanvas();
    window.addEventListener(
      "resize",
      function () {
        resizeInkCanvas();
      },
      { passive: true }
    );
  }

  function randomEdgeSpawn(vw, vh) {
    var m = edgePad;
    var side = Math.floor(Math.random() * 4);
    switch (side) {
      case 0:
        return { x: -m, y: Math.random() * vh };
      case 1:
        return { x: vw + m, y: Math.random() * vh };
      case 2:
        return { x: Math.random() * vw, y: -m };
      default:
        return { x: Math.random() * vw, y: vh + m };
    }
  }

  function pickInnerTarget(vw, vh, inset) {
    return {
      x: inset + Math.random() * Math.max(8, vw - inset * 2),
      y: inset + Math.random() * Math.max(8, vh - inset * 2),
    };
  }

  function stopFly() {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
    lastPhysicsT = 0;
    flying = false;
    el.classList.remove("is-flying");
    el.style.transition = "";
    img.style.transform = "";
    resetInkAnchors();
    clearInkVisual();
  }

  function steerToward(tx, ty, px, py, strength) {
    var dx = tx - px;
    var dy = ty - py;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) {
      return { ax: 0, ay: 0 };
    }
    return {
      ax: (dx / d) * strength,
      ay: (dy / d) * strength,
    };
  }

  function physicsTick(now) {
    if (!flying || pointerInside) {
      rafId = 0;
      return;
    }

    var dt =
      lastPhysicsT > 0
        ? Math.min(0.055, Math.max(0.001, (now - lastPhysicsT) / 1000))
        : 1 / 60;
    lastPhysicsT = now;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    if (vw < 32 || vh < 32) {
      rafId = requestAnimationFrame(physicsTick);
      return;
    }

    var inset = 28;
    var inView =
      posX >= 0 && posX <= vw && posY >= 0 && posY <= vh;

    wanderPhase += dt * (2.2 + Math.sin(now * 0.002) * 0.8);
    var wobX =
      Math.cos(wanderPhase * 3.1) * 520 +
      Math.sin(wanderPhase * 1.7 + 1.3) * 380;
    var wobY =
      Math.sin(wanderPhase * 2.9) * 520 +
      Math.cos(wanderPhase * 2.1 + 0.7) * 380;

    var ax = wobX;
    var ay = wobY;

    /* 화면 밖이면 안쪽 목표로 강하게 끌기 (목표 주기적으로 바꿔 꺾임) */
    if (!inView) {
      if (now >= nextReturnRetarget) {
        var t = pickInnerTarget(vw, vh, inset);
        returnTx = t.x;
        returnTy = t.y;
        nextReturnRetarget = now + 450 + Math.random() * 700;
      }
      var pull = steerToward(returnTx, returnTy, posX, posY, 2200);
      ax += pull.ax;
      ay += pull.ay;
    } else {
      if (now >= nextRoamAt) {
        var r = pickInnerTarget(vw, vh, inset);
        roamTx = r.x;
        roamTy = r.y;
        nextRoamAt = now + 700 + Math.random() * 1200;
      }
      var roam = steerToward(roamTx, roamTy, posX, posY, 380);
      ax += roam.ax;
      ay += roam.ay;
    }

    velX += ax * dt;
    velY += ay * dt;

    var drag = 0.9 + Math.sin(now * 0.0045) * 0.07;
    var dragPow = Math.pow(drag, dt * 60);
    velX *= dragPow;
    velY *= dragPow;

    if (burstLeft > 0) {
      burstLeft -= dt;
    } else if (Math.random() < 0.014 * (60 * dt)) {
      burstLeft = 0.1 + Math.random() * 0.2;
      var bump = 1.45 + Math.random() * 0.85;
      velX *= bump;
      velY *= bump;
      tryInkTrail(posX, posY, true, true);
    }

    var speed = Math.sqrt(velX * velX + velY * velY);
    var baseTarget = inView ? 140 : 230;
    var targetSp =
      baseTarget +
      Math.sin(now * 0.0031 + wanderPhase) * 88 +
      (inView ? 0 : 100);
    if (speed > 0.02 && speed > targetSp * 1.42) {
      var rat = targetSp / speed;
      velX *= rat;
      velY *= rat;
    } else if (speed < 65 && speed > 0.001) {
      var floorSp = 72 + Math.random() * 55;
      var rat2 = Math.min(2.3, floorSp / speed);
      velX *= rat2;
      velY *= rat2;
    }

    var maxSp = inView ? 500 : 640;
    if (speed > maxSp) {
      var sm = maxSp / speed;
      velX *= sm;
      velY *= sm;
    }

    posX += velX * dt;
    posY += velY * dt;

    var sp2 = velX * velX + velY * velY;
    if (sp2 > 55) {
      var want = Math.atan2(velY, velX);
      if (smoothHeading === null) {
        smoothHeading = want;
      } else {
        var diff = want - smoothHeading;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        smoothHeading += diff * Math.min(1, dt * 11);
      }
      img.style.transform =
        "rotate(" + (smoothHeading * 180) / Math.PI + "deg)";
    }

    var tr = toTranslate(posX, posY);
    el.style.transform = "translate3d(" + tr.x + "px," + tr.y + "px,0)";

    tryInkTrail(posX, posY);

    rafId = requestAnimationFrame(physicsTick);
  }

  function startFly() {
    leaveTimer = null;
    if (flying || pointerInside) return;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    if (vw < 32 || vh < 32) return;

    var inset0 = 28;
    var p0 = randomEdgeSpawn(vw, vh);
    posX = p0.x;
    posY = p0.y;

    var mid = pickInnerTarget(vw, vh, inset0);
    var dx = mid.x - posX;
    var dy = mid.y - posY;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var base = 190 + Math.random() * 240;
    velX = (dx / dist) * base + (Math.random() - 0.5) * 200;
    velY = (dy / dist) * base + (Math.random() - 0.5) * 200;

    smoothHeading = Math.atan2(velY, velX);
    wanderPhase = Math.random() * Math.PI * 2;
    burstLeft = 0;
    nextRoamAt = 0;
    nextReturnRetarget = 0;

    var rt = pickInnerTarget(vw, vh, inset0);
    returnTx = rt.x;
    returnTy = rt.y;
    var rRoam = pickInnerTarget(vw, vh, inset0);
    roamTx = rRoam.x;
    roamTy = rRoam.y;

    flying = true;
    lastPhysicsT = 0;
    el.classList.add("is-visible", "is-flying");
    el.style.transition = "none";

    var tr0 = toTranslate(posX, posY);
    el.style.transform = "translate3d(" + tr0.x + "px," + tr0.y + "px,0)";
    img.style.transform =
      "rotate(" + (smoothHeading * 180) / Math.PI + "deg)";

    if (rafId) cancelAnimationFrame(rafId);
    resetInkAnchors();
    tryInkTrail(posX, posY, true, false);
    rafId = requestAnimationFrame(physicsTick);
  }

  function onDocumentLeave() {
    pointerInside = false;
    if (leaveTimer) {
      window.clearTimeout(leaveTimer);
      leaveTimer = null;
    }
    leaveTimer = window.setTimeout(startFly, LEAVE_MS);
  }

  function onDocumentEnter() {
    pointerInside = true;
    if (leaveTimer) {
      window.clearTimeout(leaveTimer);
      leaveTimer = null;
    }
    stopFly();
  }

  var docEl = document.documentElement;
  docEl.addEventListener("mouseleave", onDocumentLeave);
  docEl.addEventListener("mouseenter", onDocumentEnter);

  document.addEventListener(
    "pointermove",
    function (e) {
      if (flying) return;
      var w = el.offsetWidth || 25;
      var x = e.clientX - w / 2 + xOffset;
      var y = e.clientY + gap;
      el.style.transform = "translate3d(" + x + "px," + y + "px,0)";
      el.classList.add("is-visible");
    },
    { passive: true }
  );
})();
</script>
{{- end -}}
