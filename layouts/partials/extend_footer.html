{{ if .Store.Get "hasMermaid" }}
<dialog id="mermaid-dialog" class="mermaid-dialog" aria-label="다이어그램 확대">
  <button type="button" class="mermaid-dialog__close" data-mermaid-close aria-label="닫기" title="닫기">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <div class="mermaid-dialog__content" data-mermaid-dialog-content></div>
</dialog>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  const dialog = document.getElementById('mermaid-dialog');
  const content = dialog && dialog.querySelector('[data-mermaid-dialog-content]');
  let lastExpandBtn = null;
  let savedScrollY = 0;

  function lockPageScroll() {
    savedScrollY = window.scrollY;
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.body.style.position = 'fixed';
    document.body.style.top = `-${savedScrollY}px`;
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
  }

  function unlockPageScroll() {
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    window.scrollTo(0, savedScrollY);
  }

  function isDarkTheme() {
    return document.body.classList.contains('dark');
  }

  function getMermaidConfig() {
    if (isDarkTheme()) {
      return {
        startOnLoad: false,
        theme: 'dark',
        themeVariables: {
          background: 'transparent',
          mainBkg: '#3d3d45',
          secondBkg: '#2e2e33',
          textColor: '#dadadb',
          primaryTextColor: '#dadadb',
          lineColor: '#9b9c9d',
          border1: '#9b9c9d',
          border2: '#9b9c9d',
        },
      };
    }
    return { startOnLoad: false, theme: 'default' };
  }

  function stashMermaidSources() {
    document.querySelectorAll('.mermaid').forEach((el) => {
      if (!el.dataset.mermaidSrc && el.textContent.trim()) {
        el.dataset.mermaidSrc = el.textContent.trim();
      }
    });
  }

  function restoreMermaidSources() {
    document.querySelectorAll('.mermaid').forEach((el) => {
      const src = el.dataset.mermaidSrc;
      if (!src) return;
      el.removeAttribute('data-processed');
      el.innerHTML = src;
    });
  }

  async function renderAllMermaid() {
    stashMermaidSources();
    restoreMermaidSources();
    mermaid.initialize(getMermaidConfig());
    await mermaid.run({ querySelector: '.mermaid' });
  }

  function bindExpandButtons() {
    document.querySelectorAll('.mermaid-wrap').forEach((wrap) => {
      const btn = wrap.querySelector('.mermaid-expand');
      if (!btn || btn.dataset.mermaidBound) return;
      btn.dataset.mermaidBound = '1';
      btn.addEventListener('click', () => {
        const svg = wrap.querySelector('.mermaid svg');
        if (svg) openMermaidDialog(svg, btn);
      });
    });
  }

  function closeMermaidDialog() {
    if (!dialog || !dialog.open) return;
    dialog.close();
    unlockPageScroll();
    if (content) content.replaceChildren();
    if (lastExpandBtn) {
      lastExpandBtn.focus({ preventScroll: true });
      lastExpandBtn = null;
    }
  }

  function openMermaidDialog(svg, btn) {
    if (!dialog || !content || !svg) return;
    lastExpandBtn = btn;
    lockPageScroll();
    content.replaceChildren();
    content.appendChild(svg.cloneNode(true));
    if (typeof dialog.showModal === 'function') {
      try {
        dialog.showModal({ preventScroll: true });
      } catch {
        dialog.showModal();
      }
    }
  }

  if (dialog) {
    dialog.querySelector('[data-mermaid-close]')?.addEventListener('click', closeMermaidDialog);
    dialog.addEventListener('cancel', closeMermaidDialog);
    dialog.addEventListener('click', (e) => {
      if (e.target === dialog) closeMermaidDialog();
    });
  }

  await renderAllMermaid();
  bindExpandButtons();

  const themeToggle = document.getElementById('theme-toggle');
  if (themeToggle) {
    themeToggle.addEventListener('click', () => {
      requestAnimationFrame(() => renderAllMermaid());
    });
  }
</script>
{{ end }}

{{- $cf := partialCached "cursor_follower_config.html" site -}}
{{- if gt (len $cf.chars) 0 -}}
{{- $cfgDict := dict "chars" $cf.chars -}}
<div id="cursor-follower" aria-hidden="true">
  <img src="{{ (index $cf.chars 0).url }}" alt="" decoding="async" fetchpriority="low">
</div>
<canvas id="cursor-ink-trail" aria-hidden="true"></canvas>
<script>
(function () {
  /* jsonify+JSON.parse는 hugo --minify 시 script 본문이 이중 이스케이프되어 깨질 수 있음 → safeJS로 직접 객체 리터럴 삽입 */
  var cfg = {{ $cfgDict | jsonify | safeJS }};
  var el = document.getElementById("cursor-follower");
  if (!cfg || !el) return;
  var chars = cfg.chars || [];
  var img = el.querySelector("img");
  if (!chars.length || !img) return;

  function dispatchReady() {
    document.dispatchEvent(new Event("cursor-follower:ready"));
  }

  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    window.cursorFollowerApi = {
      toggleEnabled: function () {},
      nextImage: function () {},
    };
    dispatchReady();
    return;
  }

  var LS_ON = "cursor-follower-enabled";
  var LS_IMG = "cursor-follower-img-idx";
  var INK_COLOR = { r: 168, g: 152, b: 220 };
  var imgW = 25;
  var gap = 10;
  var xOffset = 16;
  var DISPLAY_SCALE = 2 / 3;

  function curIdx() {
    var v = parseInt(localStorage.getItem(LS_IMG), 10);
    return isNaN(v) ? 0 : v;
  }

  function applyInkFromChar(c) {
    if (c && c.ink) {
      INK_COLOR.r = Number(c.ink.r);
      INK_COLOR.g = Number(c.ink.g);
      INK_COLOR.b = Number(c.ink.b);
    }
  }

  function layoutFromImage() {
    var nw = img.naturalWidth || img.offsetWidth || 24;
    var nh = img.naturalHeight || img.offsetHeight || 24;
    var c = chars[curIdx()] || chars[0];
    var tw = c && Number(c.width);
    if (tw > 0) {
      imgW = tw;
    } else {
      imgW = Math.min(52, Math.max(22, Math.round(nw)));
    }
    imgW = Math.max(14, Math.round(imgW * DISPLAY_SCALE));
    img.width = imgW;
    el.style.width = imgW + "px";
    var scale = imgW / Math.max(1, nw);
    var dispH = nh * scale;
    gap = Math.round(2 + dispH * 0.5);
    xOffset = Math.round(4 + imgW * 0.58);
  }

  function applyCharacterAtIndex(i) {
    if (i < 0 || i >= chars.length) return;
    var c = chars[i];
    applyInkFromChar(c);
    var done = function () {
      layoutFromImage();
    };
    img.onload = done;
    img.src = c.url;
    if (img.complete) requestAnimationFrame(done);
  }

  var idx0 = parseInt(localStorage.getItem(LS_IMG), 10);
  if (isNaN(idx0) || idx0 < 0 || idx0 >= chars.length) idx0 = 0;
  localStorage.setItem(LS_IMG, String(idx0));
  applyCharacterAtIndex(idx0);

  function isEnabled() {
    return localStorage.getItem(LS_ON) === "1";
  }

  function applyFromStorage() {
    var on = isEnabled();
    document.documentElement.classList.toggle("cursor-follower-off", !on);
    if (!on) {
      stopFly();
      el.classList.remove("is-visible");
      clearInkVisual();
    }
  }

  var LEAVE_MS = 7000;
  var edgePad = 72;
  var INK_GAP_PX = 5;

  var inkCanvas = document.getElementById("cursor-ink-trail");
  var inkCtx = inkCanvas && inkCanvas.getContext("2d");
  var inkDrops = [];
  var inkRaf = 0;
  var lastInkAnchorX = null;
  var lastInkAnchorY = null;

  var pointerInside = true;
  var leaveTimer = null;
  var flying = false;
  var rafId = 0;
  var lastPhysicsT = 0;

  var posX = 0;
  var posY = 0;
  var velX = 0;
  var velY = 0;
  var smoothHeading = null;
  var wanderPhase = Math.random() * Math.PI * 2;
  var burstLeft = 0;
  var nextRoamAt = 0;
  var roamTx = 0;
  var roamTy = 0;
  var returnTx = 0;
  var returnTy = 0;
  var nextReturnRetarget = 0;

  function toTranslate(px, py) {
    var w = el.offsetWidth || imgW;
    return {
      x: px - w / 2 + xOffset,
      y: py + gap,
    };
  }

  function resizeInkCanvas() {
    if (!inkCanvas || !inkCtx) return;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCanvas.width = Math.max(1, Math.floor(vw * dpr));
    inkCanvas.height = Math.max(1, Math.floor(vh * dpr));
    inkCanvas.style.width = vw + "px";
    inkCanvas.style.height = vh + "px";
    inkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    inkCtx.clearRect(0, 0, vw, vh);
  }

  function inkEmitPoint(px, py) {
    var t = toTranslate(px, py);
    var wEl = el.offsetWidth || imgW;
    var hEl = (img.offsetHeight || 26) > 4 ? img.offsetHeight : 26;
    return { x: t.x + wEl * 0.5, y: t.y + hEl * 0.78 };
  }

  function clamp255(n) {
    if (n < 0) return 0;
    if (n > 255) return 255;
    return Math.round(n);
  }

  /** 메인 잉크색 + 2~3개의 살짝 튼 비슷한 색 (한 번의 스플래시마다 팔레트 고정) */
  function inkPaletteForSplash() {
    var br = INK_COLOR.r;
    var bg = INK_COLOR.g;
    var bb = INK_COLOR.b;
    var spread = 16 + Math.random() * 24;
    var out = [{ r: br, g: bg, b: bb }];
    var extra = 2 + Math.floor(Math.random() * 2);
    var j;
    for (j = 0; j < extra; j++) {
      out.push({
        r: clamp255(br + (Math.random() - 0.5) * 2 * spread),
        g: clamp255(bg + (Math.random() - 0.5) * 2 * spread),
        b: clamp255(bb + (Math.random() - 0.5) * 2 * spread),
      });
    }
    return out;
  }

  function spawnInk(px, py, heavy) {
    if (!inkCtx) return;
    var p = inkEmitPoint(px, py);
    var n = heavy ? 6 + Math.floor(Math.random() * 5) : 4 + Math.floor(Math.random() * 4);
    var jitter = heavy ? 16 : 11;
    var palette = inkPaletteForSplash();
    var pi;
    for (pi = 0; pi < n; pi++) {
      var col = palette[Math.floor(Math.random() * palette.length)];
      inkDrops.push({
        x: p.x + (Math.random() - 0.5) * jitter,
        y: p.y + (Math.random() - 0.5) * jitter,
        rx: 1.8 + Math.random() * 5.5,
        ry: 2.2 + Math.random() * 6.2,
        rot: Math.random() * Math.PI,
        a: 0.22 + Math.random() * 0.38,
        driftX: (Math.random() - 0.5) * 0.35,
        driftY: (Math.random() - 0.5) * 0.35,
        grow: 0.12 + Math.random() * 0.22,
        life: 1,
        cr: col.r,
        cg: col.g,
        cb: col.b,
      });
    }
    inkLoopKick();
  }

  function tryInkTrail(px, py, forceSplash, heavyCluster) {
    if (!inkCtx || !flying) return;
    var ep = inkEmitPoint(px, py);
    if (forceSplash) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, !!heavyCluster);
      return;
    }
    if (lastInkAnchorX === null) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, false);
      return;
    }
    var dx = ep.x - lastInkAnchorX;
    var dy = ep.y - lastInkAnchorY;
    if (dx * dx + dy * dy >= INK_GAP_PX * INK_GAP_PX) {
      lastInkAnchorX = ep.x;
      lastInkAnchorY = ep.y;
      spawnInk(px, py, false);
    }
  }

  function inkFrame() {
    if (!inkCtx || inkDrops.length === 0) {
      inkRaf = 0;
      return;
    }
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCtx.clearRect(0, 0, vw, vh);
    inkCtx.globalCompositeOperation = "source-over";

    var i;
    var d;
    for (i = inkDrops.length - 1; i >= 0; i--) {
      d = inkDrops[i];
      d.life -= 0.0085;
      d.rx += d.grow * 0.45;
      d.ry += d.grow * 0.38;
      d.x += d.driftX;
      d.y += d.driftY;
      d.rot += (Math.random() - 0.5) * 0.02;
      if (d.life <= 0) {
        inkDrops.splice(i, 1);
        continue;
      }
      var alpha = Math.max(0, d.a * d.life);
      var r = d.cr != null ? d.cr : INK_COLOR.r;
      var g = d.cg != null ? d.cg : INK_COLOR.g;
      var b = d.cb != null ? d.cb : INK_COLOR.b;
      inkCtx.fillStyle = "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      inkCtx.save();
      inkCtx.translate(d.x, d.y);
      inkCtx.rotate(d.rot);
      inkCtx.beginPath();
      inkCtx.ellipse(0, 0, d.rx, d.ry, 0, 0, Math.PI * 2);
      inkCtx.fill();
      inkCtx.restore();
    }

    if (inkDrops.length > 0) {
      inkRaf = requestAnimationFrame(inkFrame);
    } else {
      inkRaf = 0;
    }
  }

  function inkLoopKick() {
    if (!inkRaf && inkDrops.length > 0) {
      inkRaf = requestAnimationFrame(inkFrame);
    }
  }

  function resetInkAnchors() {
    lastInkAnchorX = null;
    lastInkAnchorY = null;
  }

  function clearInkVisual() {
    if (!inkCtx) return;
    inkDrops.length = 0;
    if (inkRaf) {
      cancelAnimationFrame(inkRaf);
      inkRaf = 0;
    }
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    inkCtx.clearRect(0, 0, vw, vh);
  }

  if (inkCanvas && inkCtx) {
    resizeInkCanvas();
    window.addEventListener(
      "resize",
      function () {
        resizeInkCanvas();
      },
      { passive: true }
    );
  }

  function randomEdgeSpawn(vw, vh) {
    var m = edgePad;
    var side = Math.floor(Math.random() * 4);
    switch (side) {
      case 0:
        return { x: -m, y: Math.random() * vh };
      case 1:
        return { x: vw + m, y: Math.random() * vh };
      case 2:
        return { x: Math.random() * vw, y: -m };
      default:
        return { x: Math.random() * vw, y: vh + m };
    }
  }

  function pickInnerTarget(vw, vh, inset) {
    return {
      x: inset + Math.random() * Math.max(8, vw - inset * 2),
      y: inset + Math.random() * Math.max(8, vh - inset * 2),
    };
  }

  function stopFly() {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
    lastPhysicsT = 0;
    flying = false;
    el.classList.remove("is-flying");
    el.style.transition = "";
    img.style.transform = "";
    resetInkAnchors();
    clearInkVisual();
  }

  function steerToward(tx, ty, px, py, strength) {
    var dx = tx - px;
    var dy = ty - py;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) {
      return { ax: 0, ay: 0 };
    }
    return {
      ax: (dx / d) * strength,
      ay: (dy / d) * strength,
    };
  }

  function physicsTick(now) {
    if (!flying || pointerInside) {
      rafId = 0;
      return;
    }

    var dt =
      lastPhysicsT > 0
        ? Math.min(0.055, Math.max(0.001, (now - lastPhysicsT) / 1000))
        : 1 / 60;
    lastPhysicsT = now;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    if (vw < 32 || vh < 32) {
      rafId = requestAnimationFrame(physicsTick);
      return;
    }

    var inset = 28;
    var inView =
      posX >= 0 && posX <= vw && posY >= 0 && posY <= vh;

    wanderPhase += dt * (2.2 + Math.sin(now * 0.002) * 0.8);
    var wobX =
      Math.cos(wanderPhase * 3.1) * 520 +
      Math.sin(wanderPhase * 1.7 + 1.3) * 380;
    var wobY =
      Math.sin(wanderPhase * 2.9) * 520 +
      Math.cos(wanderPhase * 2.1 + 0.7) * 380;

    var ax = wobX;
    var ay = wobY;

    if (!inView) {
      if (now >= nextReturnRetarget) {
        var t = pickInnerTarget(vw, vh, inset);
        returnTx = t.x;
        returnTy = t.y;
        nextReturnRetarget = now + 450 + Math.random() * 700;
      }
      var pull = steerToward(returnTx, returnTy, posX, posY, 2200);
      ax += pull.ax;
      ay += pull.ay;
    } else {
      if (now >= nextRoamAt) {
        var r = pickInnerTarget(vw, vh, inset);
        roamTx = r.x;
        roamTy = r.y;
        nextRoamAt = now + 700 + Math.random() * 1200;
      }
      var roam = steerToward(roamTx, roamTy, posX, posY, 380);
      ax += roam.ax;
      ay += roam.ay;
    }

    velX += ax * dt;
    velY += ay * dt;

    var drag = 0.9 + Math.sin(now * 0.0045) * 0.07;
    var dragPow = Math.pow(drag, dt * 60);
    velX *= dragPow;
    velY *= dragPow;

    if (burstLeft > 0) {
      burstLeft -= dt;
    } else if (Math.random() < 0.014 * (60 * dt)) {
      burstLeft = 0.1 + Math.random() * 0.2;
      var bump = 1.45 + Math.random() * 0.85;
      velX *= bump;
      velY *= bump;
      tryInkTrail(posX, posY, true, true);
    }

    var speed = Math.sqrt(velX * velX + velY * velY);
    var baseTarget = inView ? 140 : 230;
    var targetSp =
      baseTarget +
      Math.sin(now * 0.0031 + wanderPhase) * 88 +
      (inView ? 0 : 100);
    if (speed > 0.02 && speed > targetSp * 1.42) {
      var rat = targetSp / speed;
      velX *= rat;
      velY *= rat;
    } else if (speed < 65 && speed > 0.001) {
      var floorSp = 72 + Math.random() * 55;
      var rat2 = Math.min(2.3, floorSp / speed);
      velX *= rat2;
      velY *= rat2;
    }

    var maxSp = inView ? 500 : 640;
    if (speed > maxSp) {
      var sm = maxSp / speed;
      velX *= sm;
      velY *= sm;
    }

    posX += velX * dt;
    posY += velY * dt;

    var sp2 = velX * velX + velY * velY;
    if (sp2 > 55) {
      /* 스프라이트 기본이 속도 벡터와 반대를 보므로 π 보정 → 진행 방향을 향함 */
      var want = Math.atan2(velY, velX) + Math.PI;
      if (smoothHeading === null) {
        smoothHeading = want;
      } else {
        var diff = want - smoothHeading;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        smoothHeading += diff * Math.min(1, dt * 11);
      }
      img.style.transform =
        "rotate(" + (smoothHeading * 180) / Math.PI + "deg)";
    }

    var tr = toTranslate(posX, posY);
    el.style.transform = "translate3d(" + tr.x + "px," + tr.y + "px,0)";

    tryInkTrail(posX, posY);

    rafId = requestAnimationFrame(physicsTick);
  }

  function startFly() {
    if (!isEnabled()) return;
    leaveTimer = null;
    if (flying || pointerInside) return;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    if (vw < 32 || vh < 32) return;

    var inset0 = 28;
    var p0 = randomEdgeSpawn(vw, vh);
    posX = p0.x;
    posY = p0.y;

    var mid = pickInnerTarget(vw, vh, inset0);
    var dx = mid.x - posX;
    var dy = mid.y - posY;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var base = 190 + Math.random() * 240;
    velX = (dx / dist) * base + (Math.random() - 0.5) * 200;
    velY = (dy / dist) * base + (Math.random() - 0.5) * 200;

    smoothHeading = Math.atan2(velY, velX) + Math.PI;
    wanderPhase = Math.random() * Math.PI * 2;
    burstLeft = 0;
    nextRoamAt = 0;
    nextReturnRetarget = 0;

    var rt = pickInnerTarget(vw, vh, inset0);
    returnTx = rt.x;
    returnTy = rt.y;
    var rRoam = pickInnerTarget(vw, vh, inset0);
    roamTx = rRoam.x;
    roamTy = rRoam.y;

    flying = true;
    lastPhysicsT = 0;
    el.classList.add("is-visible", "is-flying");
    el.style.transition = "none";

    var tr0 = toTranslate(posX, posY);
    el.style.transform = "translate3d(" + tr0.x + "px," + tr0.y + "px,0)";
    img.style.transform =
      "rotate(" + (smoothHeading * 180) / Math.PI + "deg)";

    if (rafId) cancelAnimationFrame(rafId);
    resetInkAnchors();
    tryInkTrail(posX, posY, true, false);
    rafId = requestAnimationFrame(physicsTick);
  }

  function onDocumentLeave() {
    if (!isEnabled()) return;
    pointerInside = false;
    if (leaveTimer) {
      window.clearTimeout(leaveTimer);
      leaveTimer = null;
    }
    leaveTimer = window.setTimeout(startFly, LEAVE_MS);
  }

  function onDocumentEnter() {
    pointerInside = true;
    if (leaveTimer) {
      window.clearTimeout(leaveTimer);
      leaveTimer = null;
    }
    stopFly();
  }

  var docEl = document.documentElement;
  docEl.addEventListener("mouseleave", onDocumentLeave);
  docEl.addEventListener("mouseenter", onDocumentEnter);

  document.addEventListener(
    "pointermove",
    function (e) {
      if (!isEnabled() || flying) return;
      var w = el.offsetWidth || imgW;
      var x = e.clientX - w / 2 + xOffset;
      var y = e.clientY + gap;
      el.style.transform = "translate3d(" + x + "px," + y + "px,0)";
      el.classList.add("is-visible");
    },
    { passive: true }
  );

  applyFromStorage();

  window.cursorFollowerApi = {
    toggleEnabled: function () {
      if (isEnabled()) {
        localStorage.setItem(LS_ON, "0");
      } else {
        localStorage.setItem(LS_ON, "1");
      }
      applyFromStorage();
    },
    nextImage: function () {
      var cur = parseInt(localStorage.getItem(LS_IMG), 10);
      if (isNaN(cur) || cur < 0) cur = 0;
      var next = (cur + 1) % chars.length;
      localStorage.setItem(LS_IMG, String(next));
      applyCharacterAtIndex(next);
    },
  };

  dispatchReady();
})();
</script>
{{- end -}}
